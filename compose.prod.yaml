services:
  crimelens-query:
    build: .
    container_name: crimelens-query
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  nginx:
    image: nginx:latest
    container_name: crimelens-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf