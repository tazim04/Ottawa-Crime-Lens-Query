services:
  crimelens-query:
    build: .
    container_name: crimelens-query
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    mem_limit: 1g
    mem_reservation: 512m

  nginx:
    image: nginx:latest
    container_name: crimelens-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro